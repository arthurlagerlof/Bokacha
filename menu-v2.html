<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bokachá - Menu</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="css/variables.css?v=2">
    <link rel="stylesheet" href="css/main.css?v=2">
    <link rel="stylesheet" href="css/menu.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body class="menu-page">
    <header>
        <nav>
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <picture>
                        <source srcset="images/logo.avif" type="image/avif">
                        <source srcset="images/logo.webp" type="image/webp">
                        <img src="images/logo.png" alt="Bokachá" class="logo-image">
                    </picture>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            
            <div class="mobile-nav-toggle">
                <button class="mobile-menu-btn">☰</button>
                <div class="mobile-nav-dropdown">
                    <a href="index.html" class="mobile-nav-link">Home</a>
                    <a href="menu.html" class="mobile-nav-link">Menu</a>
                    <a href="index.html#about" class="mobile-nav-link">About</a>
                    <a href="index.html#contact" class="mobile-nav-link">Contact</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section id="menu" class="menu">
            <div class="container">
                <a href="https://wolt.com/fi/fin/turku/restaurant/bokacha-coffee-shop" target="_blank" class="wolt-button">Order on Wolt</a>
                <div class="menu-grid">
                    <div class="menu-column">
                        <picture>
                            <source srcset="images/Menu.avif" type="image/avif">
                            <source srcset="images/Menu.webp" type="image/webp">
                            <img src="images/Menu.jpg" alt="Menu" class="menu-image">
                        </picture>
                    </div>
                    <div class="menu-column">
                        <picture>
                            <source srcset="images/coffee.avif" type="image/avif">
                            <source srcset="images/coffee.webp" type="image/webp">
                            <img src="images/coffee.JPG" alt="Coffee" class="menu-image">
                        </picture>
                        <picture>
                            <source srcset="images/brown-sugar.avif" type="image/avif">
                            <source srcset="images/brown-sugar.webp" type="image/webp">
                            <img src="images/brown-sugar.png" alt="Brown Sugar" class="menu-image">
                        </picture>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Bokachá</p>
            <div class="social-links">
                <a href="https://www.facebook.com/bokacha.fi/">Facebook</a>
                <a href="https://www.instagram.com/bokacha.fi/">Instagram</a>
            </div>
        </div>
    </footer>
    <script src="js/animations.js"></script>
    <script>
        // Mobile navigation functionality
        function initializeMobileNav() {
            // Find elements
            const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
            const mobileNavDropdown = document.querySelector('.mobile-nav-dropdown');
            const mobileNavLinks = document.querySelectorAll('.mobile-nav-link');
            
            if (!mobileMenuBtn || !mobileNavDropdown) {
                return;
            }
            
            // Toggle mobile menu
            mobileMenuBtn.addEventListener('click', function() {
                const isOpen = mobileNavDropdown.classList.contains('show');
                
                if (isOpen) {
                    mobileNavDropdown.classList.remove('show');
                    mobileMenuBtn.textContent = '☰';
                } else {
                    mobileNavDropdown.classList.add('show');
                    mobileMenuBtn.textContent = '×';
                }
            });
            
            // Close mobile menu when link is clicked
            mobileNavLinks.forEach((link) => {
                link.addEventListener('click', function() {
                    mobileNavDropdown.classList.remove('show');
                    mobileMenuBtn.textContent = '☰';
                });
            });
            
            // Close mobile menu when clicking outside
            document.addEventListener('click', function(event) {
                if (!mobileNavDropdown.contains(event.target) && !mobileMenuBtn.contains(event.target)) {
                    mobileNavDropdown.classList.remove('show');
                    mobileMenuBtn.textContent = '☰';
                }
            });
        }
        
        // Initialize mobile navigation
        initializeMobileNav();
    </script>
</body>
</html>
